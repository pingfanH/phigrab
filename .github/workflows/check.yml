name: Check

on:
  push: {}
  pull_request: {}

env:
  PRPR_AVC_FFMPEG_VERSION: 20260309_v0

jobs:
  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macOS
            os: macos-14
            target: aarch64-apple-darwin
          - name: iOS
            os: macos-14
            target: aarch64-apple-ios

    steps:
      - uses: actions/checkout@v4

      - name: Prepare (ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install librust-alsa-sys-dev libglib2.0-dev libasound2t64 libatk-adaptor libgail-common libgtk-3-dev libvorbis-dev libogg-dev

      - name: Prepare (macOS)
        if: runner.os == 'macOS'
        run: brew install libvorbis

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install
          rustup target add ${{ matrix.target }}

      - name: Select Xcode (iOS)
        if: matrix.target == 'aarch64-apple-ios'
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Download FFmpeg static libs
        run: |
          mkdir -p prpr-avc/static-lib/${{ matrix.target }}
          target="${{ matrix.target }}"
          versioned_url="https://github.com/TeamFlos/prpr-avc-ffmpeg/releases/download/${PRPR_AVC_FFMPEG_VERSION}/${target}.tar.gz"
          latest_url="https://github.com/TeamFlos/prpr-avc-ffmpeg/releases/latest/download/${target}.tar.gz"
          if [[ "$target" == "aarch64-apple-ios" ]]; then
            # The 20260309_v0 iOS archive contains macOS-marked arm64 objects.
            curl -fL --retry 3 -o prpr-avc-static-lib.tar.gz "$latest_url"
          elif ! curl -fL --retry 3 -o prpr-avc-static-lib.tar.gz "$versioned_url"; then
            echo "[Phigrab] static libs not found in ${PRPR_AVC_FFMPEG_VERSION} for ${{ matrix.target }}; trying latest..."
            curl -fL --retry 3 -o prpr-avc-static-lib.tar.gz "$latest_url"
          fi
          tar -xzf prpr-avc-static-lib.tar.gz -C prpr-avc/static-lib/${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Clippy
        run: |
          cargo clippy --all-targets --all-features --workspace \
            --target ${{ matrix.target }} -- \
            -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install librust-alsa-sys-dev libglib2.0-dev libasound2t64 libatk-adaptor libgail-common libgtk-3-dev libvorbis-dev libogg-dev

      - name: Setup Rust toolchain
        run: rustup toolchain install

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Format
        run: cargo fmt --all --check

  android:
    name: Android
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANDROID_NDK_VERSION: 26.1.10909125

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust toolchain
        run: rustup toolchain install

      - name: Install Android SDK packages
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          set +o pipefail
          yes | "$SDKMANAGER" --licenses >/dev/null
          set -o pipefail
          "$SDKMANAGER" "platforms;android-35" "platform-tools" "build-tools;35.0.0" "ndk;$ANDROID_NDK_VERSION"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Build Android APK
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export NDK_HOME="$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION"
          scripts/run_android_release.sh

  tests:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install librust-alsa-sys-dev libglib2.0-dev libasound2t64 libatk-adaptor libgail-common libgtk-3-dev libvorbis-dev libogg-dev

      - name: Setup Rust toolchain
        run: rustup toolchain install

      - name: Download FFmpeg static libs
        run: |
          mkdir -p prpr-avc/static-lib/x86_64-unknown-linux-gnu
          target="x86_64-unknown-linux-gnu"
          versioned_url="https://github.com/TeamFlos/prpr-avc-ffmpeg/releases/download/${PRPR_AVC_FFMPEG_VERSION}/${target}.tar.gz"
          latest_url="https://github.com/TeamFlos/prpr-avc-ffmpeg/releases/latest/download/${target}.tar.gz"
          if ! curl -fL --retry 3 -o prpr-avc-static-lib.tar.gz "$versioned_url"; then
            echo "[Phigrab] static libs not found in ${PRPR_AVC_FFMPEG_VERSION} for ${target}; trying latest..."
            curl -fL --retry 3 -o prpr-avc-static-lib.tar.gz "$latest_url"
          fi
          tar -xzf prpr-avc-static-lib.tar.gz -C prpr-avc/static-lib/x86_64-unknown-linux-gnu

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Run tests
        run: cargo test --workspace --no-fail-fast
