name: Release Artifacts

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  PRPR_AVC_FFMPEG_VERSION: 20260309_v0

defaults:
  run:
    shell: bash

jobs:
  desktop:
    name: Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: windows-x64
            artifact: phigrab-windows-x64
          - name: macOS arm64
            os: macos-14
            target: macos-arm64
            artifact: phigrab-macos-arm64
          - name: Linux x64
            os: ubuntu-latest
            target: linux-x64
            artifact: phigrab-linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libglib2.0-dev libgtk-3-dev pkg-config zip
          curl -fL --retry 3 \
            -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool

      - name: Prepare macOS dependencies
        if: runner.os == 'macOS'
        run: brew install libvorbis

      - name: Setup Rust toolchain
        run: rustup toolchain install

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Build desktop package
        run: scripts/build_desktop_release.sh --target "${{ matrix.target }}"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/desktop/*.zip
            dist/desktop/*.dmg
            dist/desktop/*.AppImage
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANDROID_NDK_VERSION: 26.1.10909125

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust toolchain
        run: rustup toolchain install

      - name: Install Android SDK packages
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" "platforms;android-35" "platform-tools" "build-tools;35.0.0" "ndk;$ANDROID_NDK_VERSION"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Build Android APK
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export NDK_HOME="$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION"
          scripts/run_android_release.sh

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: phigrab-android-apk
          path: dist/android/**/*.apk
          if-no-files-found: error

  ios:
    name: iOS arm64
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Setup Rust toolchain
        run: rustup toolchain install

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Build iOS app bundle
        run: scripts/build_ios_release.sh --target ios-arm64

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: phigrab-ios-arm64
          path: dist/ios/*.ipa
          if-no-files-found: error
